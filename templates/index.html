<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#e94560">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<title>Nudge — DO IT!!!</title>
<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --card: #16213e;
  --accent: #e94560;
  --accent-hover: #d63851;
  --text: #e0e0e0;
  --text-muted: #8a8a9a;
  --success: #2ecc71;
  --border: #2a2a4a;
  --input-bg: #0d1b2a;
}

[data-theme="light"] {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --card: #f0f0f0;
  --accent: #e94560;
  --accent-hover: #d63851;
  --text: #1a1a2e;
  --text-muted: #666;
  --success: #27ae60;
  --border: #ddd;
  --input-bg: #fff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 0 16px 80px;
}

/* Header */
header {
  text-align: center;
  padding: 32px 0 24px;
  position: relative;
}

header h1 {
  font-size: 2.8rem;
  font-weight: 900;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
}

header .subtitle {
  color: var(--text-muted);
  font-size: 0.85rem;
  margin-top: 4px;
}

.header-btns {
  position: absolute;
  top: 32px;
  right: 0;
  display: flex;
  gap: 2px;
}

.header-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1.4rem;
  cursor: pointer;
  padding: 8px;
  border-radius: 8px;
  transition: color 0.2s, background 0.2s;
}

.header-btn:hover {
  color: var(--text);
  background: var(--card);
}

/* Share modal */
.share-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 999;
  display: none;
  justify-content: center;
  align-items: center;
}

.share-overlay.visible { display: flex; }

.share-panel {
  background: var(--surface);
  border-radius: 16px;
  padding: 24px;
  width: 90%;
  max-width: 360px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  text-align: center;
}

.share-panel h2 {
  font-size: 1.3rem;
  margin-bottom: 16px;
  color: var(--accent);
}


.share-actions {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}

.share-actions button {
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
}

.share-actions .share-email {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
}

.share-actions .share-native {
  background: var(--accent);
  color: white;
}

.share-actions .share-close {
  background: none;
  color: var(--text-muted);
}

/* Add reminder */
.add-form {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
}

.add-form input {
  flex: 1;
  padding: 12px 16px;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: var(--input-bg);
  color: var(--text);
  font-size: 1rem;
  outline: none;
  transition: border-color 0.2s;
}

.add-form input:focus {
  border-color: var(--accent);
}

.add-form input::placeholder {
  color: var(--text-muted);
}

.add-form button {
  padding: 12px 20px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  white-space: nowrap;
}

.add-form button:hover { background: var(--accent-hover); }
.add-form button:active { transform: scale(0.96); }

/* Reminder list */
.reminder-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.reminder-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--card);
  padding: 12px 14px;
  border-radius: 10px;
  transition: background 0.2s, transform 0.15s;
  animation: slideIn 0.2s ease-out;
  position: relative;
}

.drag-handle {
  cursor: grab;
  color: var(--text-muted);
  font-size: 1.1rem;
  padding: 4px 2px;
  flex-shrink: 0;
  user-select: none;
  touch-action: none;
  line-height: 1;
}

.drag-handle:active { cursor: grabbing; }

.reminder-item.dragging {
  opacity: 0.4;
}

.reminder-item.drag-over {
  border-top: 2px solid var(--accent);
  margin-top: -2px;
}

.reminder-item.drag-over-bottom {
  border-bottom: 2px solid var(--accent);
  margin-bottom: -2px;
}

.reminder-list {
  min-height: 60px;
  padding-bottom: 40px;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.reminder-item:hover { background: var(--surface); }

.reminder-item .pin-badge {
  font-size: 0.8rem;
  flex-shrink: 0;
}

.reminder-item .text {
  flex: 1;
  font-size: 1rem;
  word-break: break-word;
}

.reminder-item .text.editing {
  display: none;
}

.reminder-item .edit-input {
  flex: 1;
  padding: 6px 10px;
  border: 2px solid var(--accent);
  border-radius: 6px;
  background: var(--input-bg);
  color: var(--text);
  font-size: 1rem;
  outline: none;
  display: none;
}

.reminder-item .edit-input.active {
  display: block;
}

.reminder-item .actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

.btn-icon {
  width: 34px;
  height: 34px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  transition: background 0.2s, transform 0.1s;
}

.btn-icon:active { transform: scale(0.9); }

.btn-complete {
  background: var(--success);
  color: white;
}

.btn-complete:hover { background: #27ae60; }

.btn-delete {
  background: transparent;
  color: var(--text-muted);
}

.btn-delete:hover { background: var(--accent); color: white; }

.btn-menu {
  background: transparent;
  color: var(--text-muted);
}

.btn-menu:hover { background: var(--border); color: var(--text); }

.btn-save {
  background: var(--accent);
  color: white;
}

/* Context menu */
.context-menu {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px 0;
  min-width: 140px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  z-index: 1000;
  display: none;
}

.context-menu.visible { display: block; }

.context-menu button {
  display: block;
  width: 100%;
  padding: 8px 16px;
  border: none;
  background: none;
  color: var(--text);
  font-size: 0.9rem;
  text-align: left;
  cursor: pointer;
}

.context-menu button:hover { background: var(--card); }

/* Completed section */
.completed-section {
  margin-top: 32px;
}

.completed-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  cursor: pointer;
  user-select: none;
}

.completed-header h2 {
  font-size: 1.3rem;
  color: var(--success);
  font-weight: 800;
}

.completed-header .arrow {
  color: var(--text-muted);
  font-size: 1.2rem;
  transition: transform 0.2s;
}

.completed-header .arrow.open { transform: rotate(180deg); }

.completed-list {
  display: none;
  flex-direction: column;
  gap: 6px;
}

.completed-list.open { display: flex; }

.completed-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--card);
  border-radius: 8px;
  opacity: 0.7;
}

.completed-item .text {
  flex: 1;
  text-decoration: line-through;
  color: var(--text-muted);
}

.completed-item .time {
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* Settings panel */
.settings-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 999;
  display: none;
  justify-content: center;
  align-items: center;
}

.settings-overlay.visible { display: flex; }

.settings-panel {
  background: var(--surface);
  border-radius: 16px;
  padding: 24px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.4);
}

.settings-panel h2 {
  font-size: 1.3rem;
  margin-bottom: 20px;
  color: var(--accent);
}

.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.setting-row:last-child { border-bottom: none; }

.setting-row label {
  font-size: 0.95rem;
  color: var(--text);
}

.setting-row select,
.setting-row input[type="number"] {
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--input-bg);
  color: var(--text);
  font-size: 0.9rem;
}

.theme-toggle {
  display: flex;
  gap: 4px;
  background: var(--card);
  border-radius: 8px;
  padding: 3px;
}

.theme-toggle button {
  padding: 6px 12px;
  border: none;
  border-radius: 6px;
  background: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 0.8rem;
  transition: all 0.2s;
}

.theme-toggle button.active {
  background: var(--accent);
  color: white;
}

.settings-close {
  margin-top: 16px;
  width: 100%;
  padding: 10px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
}

.settings-close:hover { background: var(--accent-hover); }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 48px 16px;
  color: var(--text-muted);
}

.empty-state .emoji {
  font-size: 2.5rem;
  margin-bottom: 12px;
}

.empty-state p {
  font-size: 1rem;
}

/* Swipe container */
.swipe-wrapper {
  position: relative;
  overflow: hidden;
  border-radius: 10px;
}

.swipe-bg {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  align-items: center;
  font-size: 1.3rem;
  color: white;
  font-weight: 700;
  user-select: none;
}

.swipe-bg-complete {
  background: var(--success);
  justify-content: flex-start;
  padding-left: 20px;
}

.swipe-bg-delete {
  background: var(--accent);
  justify-content: flex-end;
  padding-right: 20px;
}

.swipe-wrapper .reminder-item {
  position: relative;
  z-index: 1;
  transition: none;
  animation: none;
}

.swipe-wrapper .reminder-item.swiping {
  transition: none;
}

.swipe-wrapper .reminder-item.snapping {
  transition: transform 0.2s ease-out;
}

.swipe-wrapper .reminder-item.dismissing {
  transition: transform 0.3s ease-in;
}

/* Undo toast */
.undo-toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 16px;
  display: none;
  align-items: center;
  gap: 12px;
  z-index: 1001;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  max-width: 90%;
  animation: slideUp 0.2s ease-out;
}

.undo-toast.visible { display: flex; }

.undo-toast .toast-text {
  font-size: 0.85rem;
  color: var(--text);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.undo-toast button {
  padding: 6px 14px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  flex-shrink: 0;
}

/* Selection mode */
.reminder-item.selected {
  outline: 2px solid var(--accent);
  outline-offset: -2px;
  background: rgba(233, 69, 96, 0.1);
}

.reminder-item .select-check {
  display: none;
  width: 22px;
  height: 22px;
  border: 2px solid var(--text-muted);
  border-radius: 6px;
  flex-shrink: 0;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  color: white;
  transition: all 0.15s;
}

body.select-mode .select-check { display: flex; }
body.select-mode .drag-handle { display: none; }
body.select-mode .actions { display: none; }
body.select-mode .reminder-item { cursor: pointer; }
body.select-mode .reminder-item[draggable] { draggable: false; }

.reminder-item.selected .select-check {
  background: var(--accent);
  border-color: var(--accent);
}

/* Flagged for deletion (sync conflict) */
.reminder-item.deletion-flagged {
  border: 2px dashed #e74c3c;
  background: rgba(231, 76, 60, 0.08);
}

.reminder-item.deletion-flagged .text {
  text-decoration: line-through;
  color: var(--text-muted);
}

.reminder-item .flag-icon {
  display: none;
  color: #e74c3c;
  font-size: 0.85rem;
  flex-shrink: 0;
}

.reminder-item.deletion-flagged .flag-icon { display: inline; }

/* Floating action bar */
.action-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  display: none;
  align-items: center;
  justify-content: center;
  gap: 10px;
  z-index: 998;
  box-shadow: 0 -4px 16px rgba(0,0,0,0.3);
  animation: slideUp 0.2s ease-out;
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.action-bar.visible { display: flex; }

.action-bar .count {
  font-size: 0.9rem;
  color: var(--text-muted);
  margin-right: auto;
}

.action-bar button {
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}

.action-bar button:active { transform: scale(0.95); }

.action-bar .bar-complete {
  background: var(--success);
  color: white;
}

.action-bar .bar-delete {
  background: var(--accent);
  color: white;
}

.action-bar .bar-select-all {
  background: var(--card);
  color: var(--text);
  border: 1px solid var(--border);
}

.action-bar .bar-cancel {
  background: none;
  color: var(--text-muted);
}

/* Responsive */
@media (max-width: 480px) {
  header h1 { font-size: 2.2rem; }
  .container { padding: 0 12px 80px; }
  .add-form { flex-direction: column; }
  .add-form button { width: 100%; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>DO IT!!!</h1>
    <div class="subtitle">Your daily nudge</div>
    <div class="header-btns">
      <button class="header-btn" onclick="openShare()" title="Share">&#x1F517;</button>
      <button class="header-btn" onclick="toggleSettings()" title="Settings">&#9881;</button>
    </div>
  </header>

  <form class="add-form" onsubmit="addReminder(event)">
    <input type="text" id="newReminder" placeholder="What needs doing?" autocomplete="off">
    <button type="submit">Add</button>
  </form>

  <div class="reminder-list" id="reminderList"></div>

  <div class="completed-section" id="completedSection" style="display:none">
    <div class="completed-header" onclick="toggleCompleted()">
      <h2>You DID it!!!</h2>
      <span class="arrow" id="completedArrow">&#9660;</span>
    </div>
    <div class="completed-list" id="completedList"></div>
  </div>
</div>

<!-- Undo toast -->
<div class="undo-toast" id="undoToast">
  <span class="toast-text" id="undoText"></span>
  <button onclick="undoAction()">Undo</button>
  <button onclick="dismissToast()" style="background:none;color:var(--text-muted);padding:4px 8px;font-size:1rem;">&times;</button>
</div>

<!-- Floating action bar for multi-select -->
<div class="action-bar" id="actionBar">
  <span class="count" id="selectCount">0 selected</span>
  <button class="bar-select-all" onclick="selectAll()">Select all</button>
  <button class="bar-complete" onclick="batchComplete()">Complete</button>
  <button class="bar-delete" onclick="batchDelete()">Delete</button>
  <button class="bar-cancel" onclick="exitSelectMode()">Cancel</button>
</div>

<!-- Context menu -->
<div class="context-menu" id="contextMenu"></div>

<!-- Share overlay -->
<div class="share-overlay" id="shareOverlay" onclick="closeShareOutside(event)">
  <div class="share-panel">
    <h2>Share Nudge</h2>
    <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:16px">Give someone their own copy of Nudge. They get an independent TODO list they can use right away.</p>
    <div class="share-actions">
      <button class="share-email" onclick="downloadApp()">Download file</button>
      <button class="share-email" id="shareEmailBtn" onclick="emailShareApp()">Email it</button>
      <button class="share-email" id="shareCopyBtn" style="display:none" onclick="copyShareLink()">Copy link</button>
      <button class="share-native" id="shareNativeBtn" style="display:none" onclick="nativeShare()">Share</button>
      <button class="share-close" onclick="closeShare()">Done</button>
    </div>
  </div>
</div>

<!-- Settings overlay -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettingsOutside(event)">
  <div class="settings-panel">
    <h2>Settings</h2>
    <div class="setting-row" id="settingPopupInterval">
      <label>Popup interval</label>
      <select id="intervalSelect" onchange="updateConfig()">
        <option value="1">1 min (test)</option>
        <option value="15">15 min</option>
        <option value="30">30 min</option>
        <option value="45">45 min</option>
        <option value="60" selected>60 min</option>
        <option value="90">90 min</option>
        <option value="120">2 hours</option>
      </select>
    </div>
    <div class="setting-row">
      <label>Keep completed for</label>
      <div style="display:flex;align-items:center;gap:6px">
        <input type="number" id="retentionDays" min="1" max="365" value="60" style="width:70px" onchange="updateRetention()">
        <span style="font-size:0.85rem;color:var(--text-muted)">days</span>
      </div>
    </div>
    <div class="setting-row">
      <label>Theme</label>
      <div class="theme-toggle" id="themeToggle">
        <button onclick="setTheme('light')">Light</button>
        <button onclick="setTheme('dark')" class="active">Dark</button>
        <button onclick="setTheme('system')">System</button>
      </div>
    </div>
    <div class="setting-row" style="flex-direction:column;align-items:stretch;gap:10px">
      <label>Sync</label>
      <div id="syncSection">
        <!-- Desktop: generate pairing code -->
        <div id="syncDesktop" style="display:none">
          <button onclick="generatePairingCode()" style="padding:8px 16px;background:var(--accent);color:white;border:none;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:600">Generate pairing code</button>
          <div id="pairingCodeDisplay" style="display:none;margin-top:10px">
            <div style="font-size:2rem;font-weight:900;letter-spacing:8px;text-align:center;color:var(--accent);font-family:monospace" id="pairingCode"></div>
            <div style="font-size:0.75rem;color:var(--text-muted);text-align:center;margin-top:4px" id="pairingExpiry"></div>
          </div>
          <div id="pairedDevicesInfo" style="margin-top:8px;font-size:0.8rem;color:var(--text-muted)"></div>
        </div>
        <!-- Phone/PWA: enter server + code -->
        <div id="syncPhone" style="display:none">
          <div id="syncNotPaired">
            <button onclick="scanQRToPair()" style="width:100%;padding:12px 16px;background:var(--accent);color:white;border:none;border-radius:8px;cursor:pointer;font-size:0.95rem;font-weight:600;margin-bottom:8px">Scan QR to Pair</button>
            <div id="qrScanArea" style="display:none;margin-bottom:8px;position:relative;border-radius:8px;overflow:hidden">
              <video id="qrVideo" style="width:100%;border-radius:8px" playsinline></video>
              <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:60%;height:60%;border:2px solid var(--accent);border-radius:12px;pointer-events:none"></div>
              <button onclick="stopQRScan()" style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.6);color:white;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:1.1rem">✕</button>
            </div>
            <div id="pairError" style="color:#e74c3c;font-size:0.8rem;margin-top:6px;display:none"></div>
            <div style="text-align:center;margin-top:8px">
              <button onclick="document.getElementById('manualPairFields').style.display='block';this.style.display='none'" style="background:none;border:none;color:var(--text-muted);font-size:0.75rem;cursor:pointer;text-decoration:underline">Enter manually instead</button>
            </div>
            <div id="manualPairFields" style="display:none;margin-top:8px">
              <input type="text" id="syncServerUrl" placeholder="Server address (e.g. 192.168.1.100:5123)" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--input-bg);color:var(--text);font-size:0.9rem;margin-bottom:8px">
              <input type="text" id="syncPairCode" placeholder="6-digit pairing code" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--input-bg);color:var(--text);font-size:0.9rem;margin-bottom:8px;letter-spacing:4px;text-align:center">
              <button onclick="pairWithServer()" style="width:100%;padding:8px 16px;background:var(--accent);color:white;border:none;border-radius:8px;cursor:pointer;font-size:0.85rem;font-weight:600">Pair</button>
            </div>
          </div>
          <div id="syncPaired" style="display:none">
            <div style="font-size:0.9rem;color:var(--success);margin-bottom:8px">Synced with <span id="syncedServer"></span></div>
            <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:8px" id="lastSyncTime">Last sync: never</div>
            <button onclick="syncNow()" style="padding:6px 14px;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:0.8rem;margin-right:6px">Sync now</button>
            <button onclick="unpairDevice()" style="padding:6px 14px;background:none;color:var(--text-muted);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:0.8rem">Unsync</button>
          </div>
        </div>
      </div>
    </div>
    <button class="settings-close" onclick="toggleSettings()">Done</button>
  </div>
</div>

<script>
const API = '';
let currentTheme = localStorage.getItem('nudge-theme') || 'dark';

// -- API helpers --
async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

// Try server API, swallow errors (for background sync after local writes)
async function apiQuiet(path, method = 'GET', body = null) {
  try { return await api(path, method, body); } catch (e) { return null; }
}

// -- IDB single-item helpers --
async function idbPut(storeName, item) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).put(item);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function idbDelete(storeName, id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function idbGet(storeName, id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).get(id);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}

function generateId() {
  return crypto.randomUUID ? crypto.randomUUID() : (Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2));
}

// Validate IDs contain only safe characters (prevents XSS in inline handlers)
const SAFE_ID_RE = /^[a-zA-Z0-9\-]+$/;
function isSafeId(id) {
  return typeof id === 'string' && id.length > 0 && id.length <= 100 && SAFE_ID_RE.test(id);
}

// -- Reminders --
async function loadReminders() {
  const list = document.getElementById('reminderList');
  let reminders;
  try {
    reminders = await idbGetAll('reminders');
    reminders = reminders.filter(r => isSafeId(r.id));
    reminders.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) || (b.order || 0) - (a.order || 0));
  } catch (_) {
    reminders = [];
  }

  if (reminders.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="emoji">&#128170;</div><p>No reminders yet. Add one above!<br><span style="font-size:0.8rem;color:var(--text-muted)">e.g. "Eat spaghetti with hand tied behind back"</span></p></div>';
    return;
  }

  // Preserve selection state across reloads
  const prevSelected = new Set(selectedIds);

  list.innerHTML = reminders.map((r, idx) => {
    const safeId = escapeAttr(r.id);
    return `
    <div class="swipe-wrapper" data-id="${safeId}">
      <div class="swipe-bg swipe-bg-complete">&#10003; Done</div>
      <div class="swipe-bg swipe-bg-delete" style="display:none">Delete &#128465;</div>
      <div class="reminder-item${r.deletion_flagged ? ' deletion-flagged' : ''}" data-id="${safeId}" data-order="${parseInt(r.order) || 0}" draggable="true">
        <div class="select-check">&#10003;</div>
        <span class="drag-handle" title="Drag to reorder">&#9776;</span>
        <span class="flag-icon" title="Flagged for deletion on another device">&#9888;</span>
        ${r.pinned ? '<span class="pin-badge" title="Pinned">&#128204;</span>' : ''}
        <span class="text">${escapeHtml(r.text)}</span>
        <input class="edit-input" type="text" value="${escapeAttr(r.text)}">
        <div class="actions">
          <button class="btn-icon btn-save" style="display:none" onclick="saveEdit('${safeId}', this)" title="Save">&#10003;</button>
          <button class="btn-icon btn-complete" onclick="completeReminder('${safeId}')" title="Complete">&#10003;</button>
          <button class="btn-icon btn-menu" onclick="showMenu(event, '${safeId}', ${!!r.pinned}, ${idx}, ${reminders.length})" title="More">&#8942;</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // Restore selection state if in select mode
  if (selectMode && prevSelected.size > 0) {
    selectedIds.clear();
    prevSelected.forEach(id => {
      const el = document.querySelector(`.reminder-item[data-id="${id}"]`);
      if (el) { selectedIds.add(id); el.classList.add('selected'); }
    });
    updateActionBar();
  }

  initDragAndDrop();
  initSwipe();
}

async function addReminder(e) {
  e.preventDefault();
  const input = document.getElementById('newReminder');
  const text = input.value.trim();
  if (!text) return;
  const allReminders = await idbGetAll('reminders');
  const maxOrder = allReminders.reduce((m, r) => Math.max(m, r.order || 0), -1);
  const reminder = {
    id: generateId(),
    text: text.slice(0, 500),
    created_at: new Date().toISOString(),
    completed_at: null,
    pinned: false,
    order: maxOrder + 1,
  };
  await idbPut('reminders', reminder);
  input.value = '';
  loadReminders();
  apiQuiet('/api/reminders', 'POST', reminder);
}

async function completeReminder(id) {
  const item = await idbGet('reminders', id);
  if (item) {
    item.completed_at = new Date().toISOString();
    await idbPut('completed', item);
    await idbDelete('reminders', id);
  }
  loadReminders();
  loadCompleted();
  apiQuiet(`/api/reminders/${id}/complete`, 'PATCH');
}

async function deleteReminder(id) {
  await idbDelete('reminders', id);
  loadReminders();
  apiQuiet(`/api/reminders/${id}`, 'DELETE');
}

function startEdit(id) {
  hideMenu();
  const item = document.querySelector(`.reminder-item[data-id="${id}"]`);
  if (!item) return;
  item.querySelector('.text').classList.add('editing');
  const input = item.querySelector('.edit-input');
  input.classList.add('active');
  input.focus();
  input.select();
  item.querySelector('.btn-complete').style.display = 'none';
  item.querySelector('.btn-menu').style.display = 'none';
  item.querySelector('.btn-save').style.display = 'flex';

  input.onkeydown = (e) => {
    if (e.key === 'Enter') saveEdit(id, item.querySelector('.btn-save'));
    if (e.key === 'Escape') loadReminders();
  };
}

async function saveEdit(id, btn) {
  const el = btn.closest('.reminder-item');
  const newText = el.querySelector('.edit-input').value.trim();
  if (newText) {
    const item = await idbGet('reminders', id);
    if (item) {
      item.text = newText.slice(0, 500);
      item.updated_at = new Date().toISOString();
      await idbPut('reminders', item);
    }
    apiQuiet(`/api/reminders/${id}`, 'PUT', { text: newText });
  }
  loadReminders();
}

async function togglePin(id, currentlyPinned) {
  const item = await idbGet('reminders', id);
  if (item) {
    item.pinned = !currentlyPinned;
    item.updated_at = new Date().toISOString();
    await idbPut('reminders', item);
  }
  hideMenu();
  loadReminders();
  apiQuiet(`/api/reminders/${id}`, 'PUT', { pinned: !currentlyPinned });
}

// -- Context menu --
function copyReminder(id) {
  const el = document.querySelector(`.reminder-item[data-id="${id}"] .text`);
  if (el) navigator.clipboard.writeText(el.textContent);
  hideMenu();
}
function showMenu(e, id, pinned, idx, total) {
  e.stopPropagation();
  const menu = document.getElementById('contextMenu');
  let html = `
    <button onclick="copyReminder('${id}')">Copy</button>
    <button onclick="startEdit('${id}')">Edit</button>
    <button onclick="togglePin('${id}', ${pinned})">${pinned ? 'Unpin' : 'Pin to top'}</button>`;
  html += `<button onclick="deleteReminder('${id}'); hideMenu()">Delete</button>`;
  html += `<button onclick="hideMenu(); enterSelectMode('${id}')">Select</button>`;
  menu.innerHTML = html;
  const rect = e.target.getBoundingClientRect();
  menu.style.top = rect.bottom + 4 + 'px';
  menu.style.left = Math.min(rect.left, window.innerWidth - 160) + 'px';
  menu.classList.add('visible');
}

function hideMenu() {
  document.getElementById('contextMenu').classList.remove('visible');
}

document.addEventListener('click', hideMenu);

// -- Completed --
async function loadCompleted() {
  let completed;
  try {
    completed = await idbGetAll('completed');
    completed = completed.filter(c => isSafeId(c.id));
    completed.sort((a, b) => (b.completed_at || '').localeCompare(a.completed_at || ''));
  } catch (_) {
    completed = [];
  }
  const section = document.getElementById('completedSection');
  const list = document.getElementById('completedList');

  if (completed.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  list.innerHTML = completed.map(c => `
    <div class="completed-item">
      <span class="text">${escapeHtml(c.text)}</span>
      <span class="time">${formatTime(c.completed_at)}</span>
    </div>
  `).join('');
}

function toggleCompleted() {
  const list = document.getElementById('completedList');
  const arrow = document.getElementById('completedArrow');
  list.classList.toggle('open');
  arrow.classList.toggle('open');
}

// -- Settings --
async function loadConfig() {
  try {
    const config = await api('/api/config');
    document.getElementById('intervalSelect').value = config.popup_interval_minutes;
    document.getElementById('retentionDays').value = config.completed_retention_days || 60;
    localStorage.setItem('nudge-retention-days', config.completed_retention_days || 60);
  } catch (e) {
    // Standalone mode — use localStorage
    document.getElementById('retentionDays').value = localStorage.getItem('nudge-retention-days') || 60;
  }
}

async function updateConfig() {
  const interval = parseInt(document.getElementById('intervalSelect').value);
  apiQuiet('/api/config', 'PUT', { popup_interval_minutes: interval });
}

async function updateRetention() {
  const input = document.getElementById('retentionDays');
  let days = parseInt(input.value);
  if (isNaN(days) || days < 1) { days = 1; input.value = 1; }
  if (days > 365) { days = 365; input.value = 365; }

  if (days <= 5) {
    const ok = confirm(
      `You're about to set retention to just ${days} day${days === 1 ? '' : 's'}.\n\n` +
      `Completed reminders older than ${days} day${days === 1 ? '' : 's'} will be permanently deleted — there is no undo.\n\n` +
      `Are you sure?`
    );
    if (!ok) {
      input.value = localStorage.getItem('nudge-retention-days') || 60;
      return;
    }
  }

  localStorage.setItem('nudge-retention-days', days);
  apiQuiet('/api/config', 'PUT', { completed_retention_days: days });
}

function toggleSettings() {
  document.getElementById('settingsOverlay').classList.toggle('visible');
}

function closeSettingsOutside(e) {
  if (e.target === document.getElementById('settingsOverlay')) {
    toggleSettings();
  }
}

// -- Theme --
function setTheme(theme) {
  currentTheme = theme;
  localStorage.setItem('nudge-theme', theme);
  applyTheme();
  document.querySelectorAll('#themeToggle button').forEach(b => b.classList.remove('active'));
  document.querySelector(`#themeToggle button[onclick="setTheme('${theme}')"]`).classList.add('active');
}

function applyTheme() {
  let effective = currentTheme;
  if (effective === 'system') {
    effective = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  }
  document.documentElement.setAttribute('data-theme', effective);
}

// -- Helpers --
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escapeAttr(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  return d.toLocaleDateString();
}

// -- Share --

function openShare() {
  document.getElementById('shareOverlay').classList.add('visible');
  const isMobileDevice = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  if (isMobileDevice && navigator.share) {
    // Mobile: native share (includes email, messaging, etc.)
    document.getElementById('shareNativeBtn').style.display = 'inline-block';
    document.getElementById('shareEmailBtn').style.display = 'none';
  } else {
    // Desktop: email + copy link (native share is unreliable on Windows)
    document.getElementById('shareCopyBtn').style.display = 'inline-block';
  }
}

function closeShare() {
  document.getElementById('shareOverlay').classList.remove('visible');
}

function closeShareOutside(e) {
  if (e.target === document.getElementById('shareOverlay')) {
    closeShare();
  }
}

function downloadApp() {
  // Clone the document to strip dynamic state (user's reminders, sync info, etc.)
  const clone = document.documentElement.cloneNode(true);
  // Clear rendered reminder lists
  const reminderList = clone.querySelector('#reminderList');
  if (reminderList) reminderList.innerHTML = '';
  const completedList = clone.querySelector('#completedList');
  if (completedList) completedList.innerHTML = '';
  const completedSection = clone.querySelector('#completedSection');
  if (completedSection) completedSection.style.display = 'none';
  // Reset settings inputs
  const syncServerUrl = clone.querySelector('#syncServerUrl');
  if (syncServerUrl) syncServerUrl.value = '';
  const syncPairCode = clone.querySelector('#syncPairCode');
  if (syncPairCode) syncPairCode.value = '';
  // Hide overlays
  clone.querySelectorAll('.visible').forEach(el => el.classList.remove('visible'));

  const html = '<!DOCTYPE html>' + clone.outerHTML;
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'nudge.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

function emailShareApp() {
  const subject = encodeURIComponent('Try Nudge - DO IT!!!');
  const body = encodeURIComponent(
    'Hey! I\'ve been using Nudge to track my reminders.\n\n' +
    'You can get your own copy here:\n' +
    'https://tbarthen.github.io/nudge/\n\n' +
    'Just download the app and open it — it works right in your browser!'
  );
  window.open(`mailto:?subject=${subject}&body=${body}`, '_self');
}

function copyShareLink() {
  const url = 'https://tbarthen.github.io/nudge/';
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('shareCopyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy link'; }, 1500);
  }).catch(() => {});
}

async function nativeShare() {
  try {
    await navigator.share({
      title: 'Nudge - DO IT!!!',
      text: 'Track your reminders with Nudge!',
      url: window.location.href,
    });
  } catch (e) {
    // User cancelled or share failed
  }
}

// -- Multi-select --
let selectMode = false;
let selectedIds = new Set();

function enterSelectMode(initialId) {
  selectMode = true;
  selectedIds.clear();
  document.body.classList.add('select-mode');
  if (initialId) toggleSelect(initialId);
  updateActionBar();
}

function exitSelectMode() {
  selectMode = false;
  selectedIds.clear();
  document.body.classList.remove('select-mode');
  document.querySelectorAll('.reminder-item.selected').forEach(el => el.classList.remove('selected'));
  document.getElementById('actionBar').classList.remove('visible');
}

function toggleSelect(id) {
  if (selectedIds.has(id)) {
    selectedIds.delete(id);
    const el = document.querySelector(`.reminder-item[data-id="${id}"]`);
    if (el) el.classList.remove('selected');
  } else {
    selectedIds.add(id);
    const el = document.querySelector(`.reminder-item[data-id="${id}"]`);
    if (el) el.classList.add('selected');
  }
  updateActionBar();
  if (selectedIds.size === 0) exitSelectMode();
}

function selectAll() {
  document.querySelectorAll('.reminder-item').forEach(el => {
    selectedIds.add(el.dataset.id);
    el.classList.add('selected');
  });
  updateActionBar();
}

function updateActionBar() {
  const bar = document.getElementById('actionBar');
  const count = selectedIds.size;
  if (count > 0) {
    bar.classList.add('visible');
    document.getElementById('selectCount').textContent = count + ' selected';
  } else {
    bar.classList.remove('visible');
  }
}

async function batchComplete() {
  const ids = [...selectedIds];
  if (ids.length === 0) return;
  exitSelectMode();
  for (const id of ids) {
    const item = await idbGet('reminders', id);
    if (item) {
      item.completed_at = new Date().toISOString();
      await idbPut('completed', item);
      await idbDelete('reminders', id);
    }
  }
  loadReminders();
  loadCompleted();
  apiQuiet('/api/reminders/batch-complete', 'POST', ids);
}

async function batchDelete() {
  const ids = [...selectedIds];
  if (ids.length === 0) return;
  const ok = confirm(`Permanently delete ${ids.length} reminder${ids.length === 1 ? '' : 's'}?\n\nThis cannot be undone.`);
  if (!ok) return;
  exitSelectMode();
  for (const id of ids) {
    await idbDelete('reminders', id);
  }
  loadReminders();
  apiQuiet('/api/reminders/batch-delete', 'POST', ids);
}

function initSelectHandlers() {
  const list = document.getElementById('reminderList');

  // Click handler for select mode toggling
  list.addEventListener('click', e => {
    if (!selectMode) return;
    const item = e.target.closest('.reminder-item');
    if (!item) return;
    // Don't interfere with edit inputs
    if (e.target.closest('.edit-input')) return;
    e.preventDefault();
    e.stopPropagation();
    toggleSelect(item.dataset.id);
  }, true);

  // Long-press to enter select mode (mobile + desktop)
  let pressTimer = null;
  let pressItem = null;

  list.addEventListener('pointerdown', e => {
    const item = e.target.closest('.reminder-item');
    if (!item || selectMode) return;
    // Don't trigger on buttons or inputs
    if (e.target.closest('.actions') || e.target.closest('.edit-input')) return;
    pressItem = item;
    pressTimer = setTimeout(() => {
      enterSelectMode(item.dataset.id);
      if (navigator.vibrate) navigator.vibrate(30);
      pressTimer = null;
    }, 500);
  });

  list.addEventListener('pointermove', () => {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
  });

  list.addEventListener('pointerup', () => {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
  });

  list.addEventListener('pointercancel', () => {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
  });
}

initSelectHandlers();

// -- Undo toast --
let undoData = null; // { type: 'complete'|'delete', id, text, reminder }

function showUndo(type, text, reminder) {
  undoData = { type, id: reminder.id, text, reminder };
  const toast = document.getElementById('undoToast');
  document.getElementById('undoText').textContent =
    type === 'complete' ? `Completed: ${text}` : `Deleted: ${text}`;
  toast.classList.add('visible');
}

function dismissToast() {
  document.getElementById('undoToast').classList.remove('visible');
  undoData = null;
}

async function undoAction() {
  if (!undoData) return;
  document.getElementById('undoToast').classList.remove('visible');
  if (undoData.type === 'complete') {
    const item = await idbGet('completed', undoData.id);
    if (item) {
      item.completed_at = null;
      await idbPut('reminders', item);
      await idbDelete('completed', undoData.id);
    }
    apiQuiet(`/api/completed/${undoData.id}/uncomplete`, 'PATCH');
  } else {
    // Re-create the reminder with original ID to prevent sync duplicates
    const restored = {
      id: undoData.reminder.id || generateId(),
      text: undoData.text,
      created_at: undoData.reminder.created_at || new Date().toISOString(),
      completed_at: null,
      pinned: undoData.reminder.pinned || false,
      order: undoData.reminder.order || 0,
    };
    await idbPut('reminders', restored);
    apiQuiet('/api/reminders', 'POST', restored);
  }
  undoData = null;
  loadReminders();
  loadCompleted();
}

// -- Swipe gestures --
const SWIPE_THRESHOLD = 80;

function initSwipe() {
  const wrappers = document.querySelectorAll('.swipe-wrapper');

  wrappers.forEach(wrapper => {
    const item = wrapper.querySelector('.reminder-item');
    const bgComplete = wrapper.querySelector('.swipe-bg-complete');
    const bgDelete = wrapper.querySelector('.swipe-bg-delete');
    let startX = 0, currentX = 0, swiping = false;

    item.addEventListener('touchstart', e => {
      if (selectMode) return;
      startX = e.touches[0].clientX;
      currentX = 0;
      swiping = true;
      item.classList.remove('snapping', 'dismissing');
      item.classList.add('swiping');
    }, { passive: true });

    item.addEventListener('touchmove', e => {
      if (!swiping || selectMode) return;
      currentX = e.touches[0].clientX - startX;

      // Show correct background
      if (currentX > 0) {
        bgComplete.style.display = 'flex';
        bgDelete.style.display = 'none';
      } else if (currentX < 0) {
        bgDelete.style.display = 'flex';
        bgComplete.style.display = 'none';
      }

      item.style.transform = `translateX(${currentX}px)`;
    }, { passive: true });

    item.addEventListener('touchend', async () => {
      if (!swiping) return;
      swiping = false;
      item.classList.remove('swiping');

      const id = wrapper.dataset.id;
      const textEl = item.querySelector('.text');
      const text = textEl ? textEl.textContent : '';

      if (currentX > SWIPE_THRESHOLD) {
        // Swipe right — complete
        item.classList.add('dismissing');
        item.style.transform = `translateX(${window.innerWidth}px)`;
        const reminderData = { id, text, pinned: !!item.querySelector('.pin-badge') };
        setTimeout(async () => {
          const idbItem = await idbGet('reminders', id);
          if (idbItem) {
            idbItem.completed_at = new Date().toISOString();
            await idbPut('completed', idbItem);
            await idbDelete('reminders', id);
          }
          showUndo('complete', text, reminderData);
          loadReminders();
          loadCompleted();
          apiQuiet(`/api/reminders/${id}/complete`, 'PATCH');
        }, 300);
      } else if (currentX < -SWIPE_THRESHOLD) {
        // Swipe left — delete
        item.classList.add('dismissing');
        item.style.transform = `translateX(-${window.innerWidth}px)`;
        const reminderData = { id, text, pinned: !!item.querySelector('.pin-badge') };
        setTimeout(async () => {
          await idbDelete('reminders', id);
          showUndo('delete', text, reminderData);
          loadReminders();
          apiQuiet(`/api/reminders/${id}`, 'DELETE');
        }, 300);
      } else {
        // Snap back
        item.classList.add('snapping');
        item.style.transform = 'translateX(0)';
        setTimeout(() => {
          bgComplete.style.display = 'none';
          bgDelete.style.display = 'none';
        }, 200);
      }
    });

    item.addEventListener('touchcancel', () => {
      swiping = false;
      item.classList.remove('swiping');
      item.classList.add('snapping');
      item.style.transform = 'translateX(0)';
    });
  });
}

// -- Reorder --
async function applyReorder(reorderData) {
  const safe = reorderData.filter(e => isSafeId(e.id));
  for (const entry of safe) {
    const item = await idbGet('reminders', entry.id);
    if (item) {
      item.order = entry.order;
      item.updated_at = new Date().toISOString();
      await idbPut('reminders', item);
    }
  }
  apiQuiet('/api/reminders/reorder', 'POST', safe);
}

function initDragAndDrop() {
  const list = document.getElementById('reminderList');
  const items = list.querySelectorAll('.reminder-item');
  let dragItem = null;

  // List-level drop zone — handles dropping below the last item
  list.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    // If not over any item, treat as "drop at end"
    const overItem = e.target.closest('.reminder-item');
    if (!overItem && dragItem) {
      items.forEach(i => i.classList.remove('drag-over'));
      // Highlight last item's bottom edge
      const lastItem = items[items.length - 1];
      if (lastItem && lastItem !== dragItem) lastItem.classList.add('drag-over-bottom');
    }
  });

  list.addEventListener('dragleave', e => {
    if (!list.contains(e.relatedTarget)) {
      items.forEach(i => { i.classList.remove('drag-over'); i.classList.remove('drag-over-bottom'); });
    }
  });

  list.addEventListener('drop', async e => {
    e.preventDefault();
    const overItem = e.target.closest('.reminder-item');
    items.forEach(i => { i.classList.remove('drag-over'); i.classList.remove('drag-over-bottom'); });
    // Only handle drops that didn't land on a specific item (those are handled per-item)
    if (overItem || !dragItem) return;

    // Move dragged item to end
    const allItems = [...list.querySelectorAll('.reminder-item')];
    const fromIdx = allItems.indexOf(dragItem);
    allItems.splice(fromIdx, 1);
    allItems.push(dragItem);

    const reorder = allItems.map((el, i) => ({
      id: el.dataset.id,
      order: allItems.length - 1 - i
    }));
    await applyReorder(reorder);
    loadReminders();
  });

  items.forEach(item => {
    // Desktop drag events
    item.addEventListener('dragstart', e => {
      if (selectMode) { e.preventDefault(); return; }
      dragItem = item;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', item.dataset.id);
    });

    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
      items.forEach(i => { i.classList.remove('drag-over'); i.classList.remove('drag-over-bottom'); });
      dragItem = null;
    });

    item.addEventListener('dragover', e => {
      e.preventDefault();
      e.stopPropagation();
      e.dataTransfer.dropEffect = 'move';
      if (item !== dragItem) {
        items.forEach(i => { i.classList.remove('drag-over'); i.classList.remove('drag-over-bottom'); });
        // Determine if dropping above or below based on cursor position
        const rect = item.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        if (e.clientY > midY) {
          item.classList.add('drag-over-bottom');
        } else {
          item.classList.add('drag-over');
        }
      }
    });

    item.addEventListener('dragleave', () => {
      item.classList.remove('drag-over');
      item.classList.remove('drag-over-bottom');
    });

    item.addEventListener('drop', async e => {
      e.preventDefault();
      e.stopPropagation();
      items.forEach(i => { i.classList.remove('drag-over'); i.classList.remove('drag-over-bottom'); });
      if (!dragItem || item === dragItem) return;

      // Determine insert position based on cursor vs midpoint
      const rect = item.getBoundingClientRect();
      const midY = rect.top + rect.height / 2;
      const insertAfter = e.clientY > midY;

      const allItems = [...list.querySelectorAll('.reminder-item')];
      const fromIdx = allItems.indexOf(dragItem);
      let toIdx = allItems.indexOf(item);
      allItems.splice(fromIdx, 1);
      // Adjust toIdx after removal
      if (fromIdx < toIdx) toIdx--;
      if (insertAfter) toIdx++;
      allItems.splice(toIdx, 0, dragItem);

      // Assign descending orders (highest = first)
      const reorder = allItems.map((el, i) => ({
        id: el.dataset.id,
        order: allItems.length - 1 - i
      }));
      await applyReorder(reorder);
      loadReminders();
    });

    // Touch drag support (long-press to initiate)
    const handle = item.querySelector('.drag-handle');
    let touchTimeout = null;
    let touchDragging = false;
    let touchClone = null;
    let touchStartY = 0;

    handle.addEventListener('touchstart', e => {
      touchStartY = e.touches[0].clientY;
      touchTimeout = setTimeout(() => {
        touchDragging = true;
        dragItem = item;
        item.classList.add('dragging');
        // Create floating clone
        touchClone = item.cloneNode(true);
        touchClone.style.cssText = `position:fixed;left:${item.getBoundingClientRect().left}px;top:${e.touches[0].clientY - 20}px;width:${item.offsetWidth}px;opacity:0.8;z-index:9999;pointer-events:none;`;
        document.body.appendChild(touchClone);
        if (navigator.vibrate) navigator.vibrate(30);
      }, 400);
    }, { passive: true });

    handle.addEventListener('touchmove', e => {
      if (!touchDragging) {
        if (Math.abs(e.touches[0].clientY - touchStartY) > 10) {
          clearTimeout(touchTimeout);
        }
        return;
      }
      e.preventDefault();
      const y = e.touches[0].clientY;
      if (touchClone) touchClone.style.top = (y - 20) + 'px';

      // Find which item we're over and show drop indicator
      items.forEach(i => { i.classList.remove('drag-over'); i.classList.remove('drag-over-bottom'); });
      const overEl = document.elementFromPoint(e.touches[0].clientX, y);
      const overItem = overEl ? overEl.closest('.reminder-item') : null;
      if (overItem && overItem !== dragItem) {
        const rect = overItem.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        if (y > midY) {
          overItem.classList.add('drag-over-bottom');
        } else {
          overItem.classList.add('drag-over');
        }
      }
    }, { passive: false });

    handle.addEventListener('touchend', async () => {
      clearTimeout(touchTimeout);
      if (touchClone) {
        document.body.removeChild(touchClone);
        touchClone = null;
      }
      if (!touchDragging) return;
      touchDragging = false;
      item.classList.remove('dragging');

      const overItem = document.querySelector('.reminder-item.drag-over, .reminder-item.drag-over-bottom');
      const insertAfter = overItem ? overItem.classList.contains('drag-over-bottom') : false;
      items.forEach(i => { i.classList.remove('drag-over'); i.classList.remove('drag-over-bottom'); });
      if (!overItem || overItem === dragItem) { dragItem = null; return; }

      const allItems = [...list.querySelectorAll('.reminder-item')];
      const fromIdx = allItems.indexOf(dragItem);
      let toIdx = allItems.indexOf(overItem);
      allItems.splice(fromIdx, 1);
      if (fromIdx < toIdx) toIdx--;
      if (insertAfter) toIdx++;
      allItems.splice(toIdx, 0, dragItem);

      const reorder = allItems.map((el, i) => ({
        id: el.dataset.id,
        order: allItems.length - 1 - i
      }));
      await applyReorder(reorder);
      dragItem = null;
      loadReminders();
    });

    handle.addEventListener('touchcancel', () => {
      clearTimeout(touchTimeout);
      touchDragging = false;
      item.classList.remove('dragging');
      items.forEach(i => { i.classList.remove('drag-over'); i.classList.remove('drag-over-bottom'); });
      if (touchClone) { document.body.removeChild(touchClone); touchClone = null; }
    });
  });
}

// -- IndexedDB layer for offline PWA --
const IDB_NAME = 'nudge-db';
const IDB_VERSION = 1;
let _idbConn = null;

function openDB() {
  if (_idbConn) return Promise.resolve(_idbConn);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('reminders')) {
        db.createObjectStore('reminders', { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains('completed')) {
        db.createObjectStore('completed', { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains('meta')) {
        db.createObjectStore('meta', { keyPath: 'key' });
      }
    };
    req.onsuccess = () => { _idbConn = req.result; resolve(_idbConn); };
    req.onerror = () => reject(req.error);
  });
}

async function idbGetAll(storeName) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbPutAll(storeName, items) {
  if (!Array.isArray(items)) return;
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    // Only clear if we have replacement data — prevents wiping on empty/bad response
    if (items.length > 0) store.clear();
    items.forEach(item => store.put(item));
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function idbGetMeta(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('meta', 'readonly');
    const req = tx.objectStore('meta').get(key);
    req.onsuccess = () => resolve(req.result ? req.result.value : null);
    req.onerror = () => reject(req.error);
  });
}

async function idbSetMeta(key, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('meta', 'readwrite');
    tx.objectStore('meta').put({ key, value });
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// Auto-pair from QR code (no user interaction needed)
async function autoPairFromQR(server, code) {
  let url = server;
  if (!url.startsWith('http://') && !url.startsWith('https://')) {
    url = 'http://' + url;
  }

  let deviceId = localStorage.getItem('nudge-device-id');
  if (!deviceId) {
    deviceId = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2);
    localStorage.setItem('nudge-device-id', deviceId);
  }

  try {
    const res = await fetch(url + '/api/pair/validate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, device_id: deviceId }),
    });
    const data = await res.json();

    if (res.ok) {
      localStorage.setItem('nudge-sync-server', url);
      localStorage.setItem('nudge-device-id', data.device_id || deviceId);
      localStorage.setItem('nudge-synced', 'true');
      loadSyncState();
      syncNow();
    }
  } catch (e) { /* silent — user can pair manually if QR fails */ }
}

// QR scanner for pairing
let _qrStream = null;
let _qrAnimFrame = null;

async function scanQRToPair() {
  const errorEl = document.getElementById('pairError');
  errorEl.style.display = 'none';

  // Check for camera support
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    errorEl.textContent = 'Camera not available. Tap "Enter manually" below.';
    errorEl.style.display = 'block';
    return;
  }

  // Check for BarcodeDetector support
  if (!('BarcodeDetector' in window)) {
    errorEl.textContent = 'QR scanning not supported in this browser. Tap "Enter manually" below.';
    errorEl.style.display = 'block';
    return;
  }

  // Pre-check camera permission state
  if (navigator.permissions) {
    try {
      const perm = await navigator.permissions.query({ name: 'camera' });
      if (perm.state === 'denied') {
        showCameraBlockedHelp(errorEl);
        return;
      }
    } catch (e) { /* permissions API may not support camera query — proceed anyway */ }
  }

  const video = document.getElementById('qrVideo');
  const scanArea = document.getElementById('qrScanArea');

  try {
    _qrStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }
    });
    video.srcObject = _qrStream;
    await video.play();
    scanArea.style.display = 'block';

    const detector = new BarcodeDetector({ formats: ['qr_code'] });

    async function scanFrame() {
      if (!_qrStream) return;
      try {
        const barcodes = await detector.detect(video);
        for (const barcode of barcodes) {
          try {
            const url = new URL(barcode.rawValue);
            // Only accept QR codes from our own domain
            if (url.origin !== location.origin && url.origin !== 'https://tbarthen.github.io') continue;
            const server = url.searchParams.get('server');
            const code = url.searchParams.get('code');
            if (server && code) {
              stopQRScan();
              await autoPairFromQR(server, code);
              return;
            }
          } catch (_) { /* not a valid URL — skip */ }
        }
      } catch (e) { /* keep scanning */ }
      _qrAnimFrame = requestAnimationFrame(scanFrame);
    }
    _qrAnimFrame = requestAnimationFrame(scanFrame);
  } catch (e) {
    if (e.name === 'NotAllowedError') {
      showCameraBlockedHelp(errorEl);
    } else {
      errorEl.textContent = 'Could not start camera. Tap "Enter manually" below.';
      errorEl.style.display = 'block';
    }
  }
}

function showCameraBlockedHelp(errorEl) {
  errorEl.textContent = '';
  const b = document.createElement('b');
  b.textContent = 'Camera access blocked.';
  errorEl.appendChild(b);
  errorEl.appendChild(document.createTextNode(' To fix:'));
  errorEl.appendChild(document.createElement('br'));
  errorEl.appendChild(document.createTextNode('1. Tap the lock icon (or tune icon) in the address bar'));
  errorEl.appendChild(document.createElement('br'));
  errorEl.appendChild(document.createTextNode('2. Set Camera to Allow'));
  errorEl.appendChild(document.createElement('br'));
  errorEl.appendChild(document.createTextNode('3. Tap "Scan QR to Pair" again'));
  errorEl.appendChild(document.createElement('br'));
  errorEl.appendChild(document.createElement('br'));
  const hint = document.createElement('span');
  hint.style.cssText = 'font-size:0.7rem;color:var(--text-muted)';
  hint.textContent = 'Or: Android Settings \u2192 Apps \u2192 Chrome \u2192 Permissions \u2192 Camera \u2192 Allow';
  errorEl.appendChild(hint);
  errorEl.style.display = 'block';
}

function stopQRScan() {
  if (_qrStream) {
    _qrStream.getTracks().forEach(t => t.stop());
    _qrStream = null;
  }
  if (_qrAnimFrame) {
    cancelAnimationFrame(_qrAnimFrame);
    _qrAnimFrame = null;
  }
  document.getElementById('qrScanArea').style.display = 'none';
}

// Phone: pair with server
async function pairWithServer() {
  const serverUrl = document.getElementById('syncServerUrl').value.trim();
  const code = document.getElementById('syncPairCode').value.trim();
  const errorEl = document.getElementById('pairError');
  errorEl.style.display = 'none';

  if (!serverUrl || !code) {
    errorEl.textContent = 'Server address and code are required';
    errorEl.style.display = 'block';
    return;
  }

  // Ensure protocol prefix
  let url = serverUrl;
  if (!url.startsWith('http://') && !url.startsWith('https://')) {
    url = 'http://' + url;
  }

  // Generate a persistent device ID
  let deviceId = localStorage.getItem('nudge-device-id');
  if (!deviceId) {
    deviceId = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2);
    localStorage.setItem('nudge-device-id', deviceId);
  }

  try {
    const res = await fetch(url + '/api/pair/validate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, device_id: deviceId }),
    });
    const data = await res.json();

    if (!res.ok) {
      errorEl.textContent = data.error || 'Pairing failed';
      errorEl.style.display = 'block';
      return;
    }

    // Save sync config
    localStorage.setItem('nudge-sync-server', url);
    localStorage.setItem('nudge-device-id', data.device_id || deviceId);
    localStorage.setItem('nudge-synced', 'true');

    loadSyncState();
    syncNow(); // Initial sync
  } catch (e) {
    errorEl.textContent = 'Could not reach server. Check the address.';
    errorEl.style.display = 'block';
  }
}

// Load sync state into UI

  const synced = localStorage.getItem('nudge-synced') === 'true';
  if (synced) {

    document.getElementById('syncPaired').style.display = 'block';
    document.getElementById('syncedServer').textContent =

    const lastSync = localStorage.getItem('nudge-last-sync');
    if (lastSync) {
      document.getElementById('lastSyncTime').textContent =
        'Last sync: ' + formatTime(lastSync);
    }
  } else {
    document.getElementById('syncNotPaired').style.display = 'block';
    document.getElementById('syncPaired').style.display = 'none';
  }
}

// Perform sync
let _syncInProgress = false;

async function syncNow() {
  const server = localStorage.getItem('nudge-sync-server');
  const deviceId = localStorage.getItem('nudge-device-id');
  if (!server || !deviceId || _syncInProgress) return;
  _syncInProgress = true;

  try {
    // Gather local data from IDB (source of truth)
    const [reminders, completed] = await Promise.all([
      idbGetAll('reminders'),
      idbGetAll('completed'),
    ]);

    const res = await fetch(server + '/api/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        device_id: deviceId,
        reminders,
        completed,
      }),
    });

    if (!res.ok) {
      const err = await res.json();
      if (err.error === 'device not paired') {
        localStorage.removeItem('nudge-synced');
        loadSyncState();
        return;
      }
      console.warn('Sync failed:', err.error);
      return;
    }

    const merged = await res.json();

    // Update IndexedDB with merged data (filter unsafe IDs)
    await Promise.all([
      idbPutAll('reminders', (merged.reminders || []).filter(r => isSafeId(r.id))),
      idbPutAll('completed', (merged.completed || []).filter(c => isSafeId(c.id))),
    ]);

    localStorage.setItem('nudge-last-sync', new Date().toISOString());
    loadSyncState();

    // Reload UI
    loadReminders();
    loadCompleted();
  } catch (e) {
    console.warn('Sync error:', e.message);
  } finally {
    _syncInProgress = false;
  }
}

// Unpair device
function unpairDevice() {
  if (!confirm('Stop syncing with this server? Your local data will be kept.')) return;

  const server = localStorage.getItem('nudge-sync-server');
  const deviceId = localStorage.getItem('nudge-device-id');

  // Notify server (best-effort)
  if (server && deviceId) {
    fetch(server + '/api/pair/unpair', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ device_id: deviceId }),
    }).catch(() => {});
  }

  localStorage.removeItem('nudge-synced');
  localStorage.removeItem('nudge-sync-server');
  localStorage.removeItem('nudge-last-sync');
  loadSyncState();
}

// Auto-sync every 60s if paired
setInterval(() => {
  if (localStorage.getItem('nudge-synced') === 'true') {
    syncNow();
  }
}, 60000);

initSyncUI();
</script>
</body>
</html>
